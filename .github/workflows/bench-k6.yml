name: 多机测试

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  SERVER_HOST: bench-server-${{ github.run_id }}
  K6_HOST: bench-k6-${{ github.run_id }}

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
          cache-dependency-path: 'go.sum'

      - name: Build and run server
        run: |
          go build -ldflags="-s -w" -o bench .
          ./bench &
        env:
          CGO_ENABLED: 0

      - name: Connect to Tailscale network
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-action
          hostname: ${{ env.SERVER_HOST }}

      - name: 触发k6压测
        run: |
          echo "通知 k6 节点开始压测..."
          until echo "ready" | nc -N "${K6_HOST}" 9999; do
            echo "k6 节点监听未就绪,重试..."
            sleep 1
          done
          echo "信号发送成功,压测开始!"
        env:
          K6_HOST: ${{ env.K6_HOST }}

      - name: Wait for k6 to finish
        run: nc -l 9999

  k6-client:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Connect to Tailscale network
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-action
          hostname: ${{ env.K6_HOST }}
          ping: ${{ env.SERVER_HOST }}

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: 等待 Server 就绪
        run: nc -l 9999

      - name: Run k6 and collect pprof
        run: |
          touch k6.log
          k6 --quiet run k6.js &> >(tee k6.log) &
          K6_PID=$!
          echo $K6_PID > /tmp/k6.pid
        env:
          TARGET_HOST: ${{ env.SERVER_HOST }}

      - name: Collect Pprof Profiles
        run: |
          K6_PID=$(cat /tmp/k6.pid)
          curl -s -o cpu.prof "http://${SERVER_HOST}:6063/debug/pprof/profile?seconds=20" &
          CPU_PID=$!

          (sleep 10 && curl -s -o heap.prof "http://${SERVER_HOST}:6063/debug/pprof/heap") &
          HEAP_PID=$!

          wait $CPU_PID
          wait $HEAP_PID
          echo "等待 k6结束..."
          while kill -0 $K6_PID 2>/dev/null; do
            sleep 1
          done
          echo "k6 压测已结束!"
        env:
          SERVER_HOST: ${{ env.SERVER_HOST }}

      - name: 通知 Server 压测结束
        run: |
          echo "通知 Server 压测已结束..."
          until echo "done" | nc -N "${SERVER_HOST}" 9999; do
            echo "Server 尚未准备好接收结束信号,重试..."
            sleep 1
          done
        env:
          SERVER_HOST: ${{ env.SERVER_HOST }}